# Plague event
evenement.epidemie.titre=Plague!
evenement.epidemie.description=A deadly disease is spreading across the kingdom. Several inhabitants are sick. What do you decide?
evenement.epidemie.choix.confinement=Strict lockdown (-50 gold, -5 morale)
evenement.epidemie.choix.soigner=Treat at kingdom's expense (-200 gold, 2 deaths, -2 morale)
