# Drought event
evenement.secheresse.titre=Drought
evenement.secheresse.description=A heat wave hits the land. The harvests are compromised.
evenement.secheresse.choix.aide=Ask neighbors for help (-150 gold, -20 food, -2 morale)
evenement.secheresse.choix.subir=Tighten belts (-80 food, -5 morale)
evenement.secheresse.choix.abandon=Abandon kingdom to its fate (-12 morale)

# Gold vein event
evenement.filon_or.titre=Gold vein!
evenement.filon_or.description=A miner discovered an exceptional vein. How will you exploit it?
evenement.filon_or.choix.exploiter=Exploit immediately (+400 gold, +5 morale)
evenement.filon_or.choix.investir=Invest in equipment (+250 gold, +10 morale)

# Refugees event
evenement.refugies.titre=Refugees
evenement.refugies.description=A group of inhabitants fleeing war seeks asylum in your kingdom.
evenement.refugies.choix.accueillir=Welcome them (+3 inhabitants, -30 food, +3 morale)
evenement.refugies.choix.refuser=Refuse them (-8 morale)

# Good harvest event
evenement.bonne_recolte.titre=Bountiful harvest!
evenement.bonne_recolte.description=Seasons are mild and farmers bring an exceptional harvest.
evenement.bonne_recolte.choix.stocker=Build up reserves (+100 food, +3 morale)
evenement.bonne_recolte.choix.fete=Organize a feast (-50 gold, +10 morale)

# Brigand attack event
evenement.brigands.titre=Brigand attack!
evenement.brigands.description=Raiders prowl around the kingdom. How to react?
evenement.brigands.choix.combattre=Fight them (0 to 3 random deaths, +2 morale)
evenement.brigands.choix.payer=Pay a ransom (-150 gold)
evenement.brigands.choix.subir=Let them go (-50 gold, -30 food, -5 morale)

